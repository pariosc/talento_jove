<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Usuarios - Talento Joven</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <link rel="stylesheet" href="../css/estilos.css">
</head>
<body class="bg-light">

    <div class="d-flex min-vh-100">

        <div id="layout-sidebar"></div>

        <main class="flex-grow-1">
            
            <nav class="navbar navbar-light bg-white border-bottom px-4 py-3 shadow-sm">
                <span class="navbar-brand mb-0 h4 text-primary fw-bold">Talento Joven - UPDS</span>
                <span class="badge bg-primary">Admin</span>
            </nav>

            <div class="p-4">
                <h2 class="mb-4">Gestión de Usuarios</h2>
                
                <div class="card shadow-sm border-0">
                    <div class="card-body">
                        <p class="text-muted">Aquí irá la tabla de usuarios conectada a tu backend.</p>
                        <table class="table table-striped">
                            <thead class="table-dark">
                                <tr>
                                    <th>ID</th>
                                    <th>Nombre</th>
                                    <th>Rol</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="tabla-usuarios">
                                </tbody>
                        </table>
                        <div class="d-flex justify-content-end mb-3">
    <button class="btn btn-success" onclick="abrirModalCrear()">
        <i class="bi bi-person-plus-fill me-2"></i>Nuevo Usuario
    </button>
</div>

<div class="modal fade" id="modalUsuario" tabindex="-1" aria-labelledby="modalUsuarioLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title" id="modalUsuarioLabel">Datos del Usuario</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            
            <form id="formUsuario" onsubmit="guardarUsuario(event)">
                <div class="modal-body">
                    
                    <input type="hidden" id="usuario_id">
                    
                    <div class="mb-3">
                        <label for="email" class="form-label">Correo Electrónico (Email)</label>
                        <input type="email" class="form-control" id="email" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="password" class="form-label">Contraseña</label>
                        <input type="password" class="form-control" id="password" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="rol" class="form-label">Rol del Usuario</label>
                        <select class="form-select" id="rol" required>
                            <option value="">Seleccione un rol...</option>
                            <option value="1">1 - Administrador</option>
                            <option value="2">2 - Empresa</option>
                            <option value="3">3 - Postulante</option>
                        </select>
                    </div>
                    
                    <div class="form-check form-switch mb-3">
                        <input class="form-check-input" type="checkbox" id="estado" checked>
                        <label class="form-check-label" for="estado">Usuario Activo</label>
                    </div>
                    
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Guardar</button>
                </div>
            </form>
        </div>
    </div>
</div>

                    </div>
                </div>
            </div>
            
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Le pedimos al navegador que busque el archivo del menú
        fetch('../layouts/sidebar_admin.html')
            .then(respuesta => respuesta.text()) // Lo convierte a texto HTML
            .then(codigoHtml => {
                // Lo inyectamos dentro de la caja vacía
                document.getElementById('layout-sidebar').innerHTML = codigoHtml;
            })
            .catch(error => console.error('Error cargando el layout:', error));
    </script>

<script src="../js/usuario_get.js"></script>

</body>
</html>
